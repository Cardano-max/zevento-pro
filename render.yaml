services:
  - type: web
    name: zevento-api
    runtime: node
    rootDir: api
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npx prisma migrate deploy && node dist/main
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: zevento-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_TEMPLATE_ID
        sync: false
      - key: MSG91_SENDER_ID
        value: ZEVNTO
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: CORS_ORIGINS
        value: https://vendor-sooty.vercel.app,https://admin-roan-one-51.vercel.app,http://localhost:3000,http://localhost:3002,http://localhost:3003

databases:
  - name: zevento-db
    databaseName: zevento
    user: zevento
    plan: free
